<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Species Identification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-color: #f0f8ff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1439405326854-014607f694d7?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: -1;
            animation: fadeIn 2s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 0.3; }
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: slideUp 0.8s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 2.2rem;
        }
        
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        
        .upload-area {
            border: 3px dashed #3498db;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .upload-area:hover {
            background-color: rgba(52, 152, 219, 0.1);
            border-color: #2980b9;
        }
        
        .upload-area i {
            font-size: 50px;
            color: #3498db;
            margin-bottom: 15px;
        }
        
        .upload-area h3 {
            color: #3498db;
            margin-bottom: 10px;
        }
        
        #file-input {
            display: none;
        }
        
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .results {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s ease-out;
        }
        
        .result-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin-top: 20px;
            gap: 20px;
        }
        
        .result-box {
            flex: 1;
            min-width: 300px;
            padding: 15px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .result-box h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .result-media {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .loading {
            display: none;
            margin: 20px 0;
        }
        
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Species Facts Panel */
        .species-panel {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
        }
        
        .species-card {
            background-color: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .species-name {
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        
        .species-fact {
            color: #495057;
            font-style: italic;
            margin-bottom: 8px;
        }
        
        .species-info {
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .info-label {
            font-weight: bold;
            color: #343a40;
        }
        
        @media (max-width: 768px) {
            .container {
                width: 95%;
                padding: 20px;
            }
            
            .result-container {
                flex-direction: column;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="background-image"></div>
    
    <div class="container">
        <h1>Fish Species Identification</h1>
        <p>Upload an image or video to identify fish species using YOLOv8</p>
        
        <div class="upload-area" id="upload-area">
            <i class="fas fa-fish"></i>
            <h3>Upload Image or Video</h3>
            <p>Click to browse or drag and drop your file here</p>
            <button class="btn">Select File</button>
            <input type="file" id="file-input" accept="image/*, video/*">
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing your file...</p>
        </div>
        
        <div class="results" id="results">
            <h2>Identification Results</h2>
            <div class="result-container" id="result-container">
                <!-- Results will be displayed here -->
            </div>
            
            <div class="species-panel" id="species-panel">
                <!-- Species facts will be displayed here -->
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const uploadArea = document.getElementById('upload-area');
            const fileInput = document.getElementById('file-input');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const resultContainer = document.getElementById('result-container');
            const speciesPanel = document.getElementById('species-panel');
            
            uploadArea.addEventListener('click', function() {
                fileInput.click();
            });
            
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadArea.style.backgroundColor = 'rgba(52, 152, 219, 0.2)';
            });
            
            uploadArea.addEventListener('dragleave', function() {
                uploadArea.style.backgroundColor = '';
            });
            
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadArea.style.backgroundColor = '';
                
                if (e.dataTransfer.files.length) {
                    fileInput.files = e.dataTransfer.files;
                    handleFileUpload();
                }
            });
            
            fileInput.addEventListener('change', handleFileUpload);
            
            function handleFileUpload() {
                if (fileInput.files && fileInput.files[0]) {
                    const file = fileInput.files[0];
                    const fileName = file.name.toLowerCase();
                    
                    if (!fileName.match(/\.(jpg|jpeg|png|mp4|avi|mov)$/)) {
                        alert('Please upload an image or video file.');
                        return;
                    }
                    
                    loading.style.display = 'block';
                    results.style.display = 'none';
                    speciesPanel.innerHTML = '';
                    
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    fetch('/upload', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        loading.style.display = 'none';
                        
                        if (data.error) {
                            alert(data.error);
                            return;
                        }
                        
                        resultContainer.innerHTML = '';
                        
                        if (data.type === 'image') {
                            resultContainer.innerHTML = `
                                <div class="result-box">
                                    <h3>Original Image</h3>
                                    <img src="${data.original}" class="result-media">
                                </div>
                                <div class="result-box">
                                    <h3>Identified Species</h3>
                                    <img src="${data.processed}" class="result-media">
                                </div>
                            `;
                        } else {
                            resultContainer.innerHTML = `
                                <div class="result-box">
                                    <h3>Original Video</h3>
                                    <video controls class="result-media">
                                        <source src="${data.original}" type="video/mp4">
                                    </video>
                                </div>
                                <div class="result-box">
                                    <h3>Identified Species</h3>
                                    <video controls class="result-media">
                                        <source src="${data.processed}" type="video/mp4">
                                    </video>
                                </div>
                            `;
                        }
                        
                        // Display species information
                        if (data.species && data.species.length > 0) {
                            let speciesHTML = '<h3>Species Information</h3>';
                            data.species.forEach(species => {
                                speciesHTML += `
                                    <div class="species-card">
                                        <div class="species-name">${species.name}</div>
                                        <div class="species-fact">${species.fact}</div>
                                        <div class="species-info">
                                            <span class="info-label">Habitat:</span> ${species.habitat}
                                        </div>
                                        <div class="species-info">
                                            <span class="info-label">Conservation Status:</span> ${species.conservation}
                                        </div>
                                    </div>
                                `;
                            });
                            speciesPanel.innerHTML = speciesHTML;
                        } else {
                            speciesPanel.innerHTML = '<p>No species information available for detected fish.</p>';
                        }
                        
                        results.style.display = 'block';
                    })
                    .catch(error => {
                        loading.style.display = 'none';
                        alert('An error occurred: ' + error.message);
                    });
                }
            }
        });
    </script>
</body>
</html>
